<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logs - EOS RECEIVE</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background:#111; color:#eee; }
    pre { background:#1e1e1e; padding:16px; border-radius:8px; overflow:auto; max-height:70vh; }
    button { padding:8px 12px; }
  </style>
</head>
<body>
  <h1>Template de Logs / Erros</h1>
  <p>Use esta página para validar retorno da API e possíveis erros na coleta.</p>
  <button id="refresh">Atualizar</button>
  <pre id="output">Carregando...</pre>

  <script>
    async function load() {
      const out = document.getElementById('output');
      try {
        const [health, metrics] = await Promise.all([
          fetch('/health').then(r => r.json()),
          fetch('/api/metrics').then(r => r.json())
        ]);
        out.textContent = JSON.stringify({ health, metrics }, null, 2);
      } catch (err) {
        out.textContent = 'Erro ao buscar dados: ' + err;
      }
    }
    document.getElementById('refresh').addEventListener('click', load);
    load();
  </script>
</body>
</html>
